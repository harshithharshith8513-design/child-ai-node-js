<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Protector Card Generator - ChildGuard AI</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            blue: "#8b5cf6",
                            cyan: "#d946ef",
                            purple: "#6366f1",
                            dark: "#09070f",
                            darker: "#05040a",
                            slate: "#161127",
                            glow: "rgba(217, 70, 239, 0.15)"
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif']
                    }
                }
            }
        };
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">

    <!-- html2canvas & QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Custom Style & Built React Bundle Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" crossorigin href="/dist/assets/index.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-violet-500 selection:text-white min-h-screen">
    <!-- Hidden CSRF Token for API requests -->
    <input type="hidden" id="page-csrf-token" value="{{ csrfToken }}" />

    <!-- React App Mount Point -->
    <div id="root"></div>

    <!-- React App Module Script -->
    <script type="module" crossorigin src="/dist/assets/index.js"></script>
</body>
</html>
